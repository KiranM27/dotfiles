# tmux config -- Claude-Code-safe baseline for running many CC instances
# Sources: Anthropic terminal-config docs + known-bug workarounds

# --- Prefix: C-a (classic GNU-screen style). Tried C-Space but macOS
# input method (ironwood IME) swallows it before it reaches the terminal;
# tried C-` but it got eaten too. C-a is reliable across keyboards/layouts.
# Double-tap (C-a a) sends a literal C-a through to the shell so the
# "jump to start of line" shortcut still works. ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Claude Code compatibility (required) ---
set -g  allow-passthrough on
set -s  extended-keys on
set -as terminal-features 'xterm*:extkeys'
# DO NOT enable csi-u format -- breaks multi-line paste in Claude Code
# (upstream bug: anthropics/claude-code#43169)

# --- Colors and terminal features ---
set -g  default-terminal "tmux-256color"
set -as terminal-features ',xterm*:RGB'
set -as terminal-features ',xterm*:sync'

# --- UX for managing many panes ---
set -g  mouse on
set -g  pane-border-status top
set -g  pane-border-format " #{pane_index}: #{pane_current_command} "
set -g  status-interval 2
set -g  history-limit 50000
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on

# --- Splits that remember pwd (defaults %/" still work) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Agents cockpit: stamp the hosting Ghostty window-id on attach ---
# The `agents` fzf cockpit jumps to the Ghostty window of a session via
# Aerospace. tmux doesn't know which window hosts which session, so on every
# client-attach we record the currently-focused Aerospace window-id onto the
# attaching session's active pane (@aerospace_wid). Re-stamps each attach, so
# it self-heals; only goes stale if a session is moved windows without a
# re-attach. The script is symlinked onto PATH at ~/.local/bin (see the
# agents-cockpit README "Install") so this hook is clone-location agnostic.
set-hook -g client-attached 'run-shell "~/.local/bin/stamp-aerospace-wid.sh"'

# --- Agents cockpit: window titles = Claude session title ---
# Make tmux propagate each pane's title (Claude sets #{pane_title} to its
# session name) up to the terminal window title, so Ghostty window titles equal
# the Claude session title. The cockpit's resolve_wid() then matches a session
# to its Ghostty window by title via `aerospace list-windows`. Reversible:
# `set -g set-titles off`.
set -g set-titles on
set -g set-titles-string "#{pane_title}"
