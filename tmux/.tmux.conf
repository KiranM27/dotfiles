# tmux config -- Claude-Code-safe baseline for running many CC instances
# Sources: Anthropic terminal-config docs + known-bug workarounds

# --- Prefix: C-a (classic GNU-screen style). Tried C-Space but macOS
# input method (ironwood IME) swallows it before it reaches the terminal;
# tried C-` but it got eaten too. C-a is reliable across keyboards/layouts.
# Double-tap (C-a a) sends a literal C-a through to the shell so the
# "jump to start of line" shortcut still works. ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Claude Code compatibility (required) ---
set -g  allow-passthrough on
set -s  extended-keys on
set -as terminal-features 'xterm*:extkeys'
# DO NOT enable csi-u format -- breaks multi-line paste in Claude Code
# (upstream bug: anthropics/claude-code#43169)

# --- Colors and terminal features ---
set -g  default-terminal "tmux-256color"
set -as terminal-features ',xterm*:RGB'
set -as terminal-features ',xterm*:sync'

# --- UX for managing many panes ---
set -g  mouse on
set -g  pane-border-status top
set -g  pane-border-format " #{pane_index}: #{pane_current_command} "
set -g  status-interval 2
set -g  history-limit 50000
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on

# --- Splits that remember pwd (defaults %/" still work) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
