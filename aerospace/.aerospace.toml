# AeroSpace config -- tiling WM for macOS
# Docs: https://nikitabobko.github.io/AeroSpace/guide

start-at-login = true

# Make the Wispr Flow "Status" pill follow the focused workspace so I always
# see whether voice is being recorded. Hub window keeps its eviction to 9.
exec-on-workspace-change = ['/bin/bash', '-c', '''
sleep 0.1
FOCUSED_WORKSPACE=$(aerospace list-workspaces --focused)
[ -n "$FOCUSED_WORKSPACE" ] || FOCUSED_WORKSPACE="$AEROSPACE_FOCUSED_WORKSPACE"
STATUS_ID=$(aerospace list-windows --all --format "%{window-id}%{app-bundle-id}%{window-title}" --json | jq -r '.[] | select(.["app-bundle-id"]=="com.electron.wispr-flow" and .["window-title"]=="Status") | .["window-id"]')
if [ -n "$STATUS_ID" ] && [ -n "$FOCUSED_WORKSPACE" ]; then
  aerospace move-node-to-workspace --window-id "$STATUS_ID" "$FOCUSED_WORKSPACE"
  aerospace layout --window-id "$STATUS_ID" floating
fi
''']

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# =============================================================================
# Window routing rules.
#
# Rule order:
#   1. Floating rules (check-further-callbacks = true) so utility apps float
#      on whatever workspace they open, then still get evicted if zoned.
#   2. App routing rules (first match wins, stop).
#   3. Workspace eviction rules (fallback): anything not caught above that
#      lands on a zoned workspace gets bounced to workspace 2 (junk drawer).
#
# Eviction caveat: on-window-detected only fires on window *creation*, not on
# manual moves via alt-shift-X. You can still force a window onto a zoned
# workspace manually; it won't get bounced back.
# =============================================================================

# --- Floating: utility windows that shouldn't tile -------------------------
[[on-window-detected]]
if.app-id = 'com.apple.finder'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Preview'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.pdfeditor.pdfeditormac'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'so.cap.desktop'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.docker.docker'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-Elements.Settings'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-EventViewer'
check-further-callbacks = true
run = 'layout floating'

# --- D: agents cockpit (the one Ghostty window titled "Agent Cockpit") ------
# MUST precede the generic Ghostty→C rule below (first match wins) so the
# cockpit lands on its own workspace D instead of the shared Claude zone C.
# The launcher sets this window title via OSC-2 + does a one-shot move to D.
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.window-title-regex-substring = 'Agent Cockpit'
run = 'move-node-to-workspace D'

# --- C: Ghostty (terminal / Claude zone) -----------------------------------
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace C'

# --- A: browsers -----------------------------------------------------------
[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser'
run = 'move-node-to-workspace A'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace A'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace A'

# --- 1: personal comms -----------------------------------------------------
[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'im.riot.app'
run = 'move-node-to-workspace 1'

# --- S: work comms ---------------------------------------------------------
[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = 'move-node-to-workspace S'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace S'

# --- E: Codex (AI coding — joins the code-editor zone below) ----------------
[[on-window-detected]]
if.app-id = 'com.openai.codex'
run = 'move-node-to-workspace E'

# --- E: code editors + code-adjacent ---------------------------------------
[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = 'move-node-to-workspace E'

[[on-window-detected]]
if.app-id = 'org.jkiss.dbeaver.core.product'
run = 'move-node-to-workspace E'

[[on-window-detected]]
if.app-id = 'com.github.GitHubClient'
run = 'move-node-to-workspace E'

# --- B: productivity / notes -----------------------------------------------
[[on-window-detected]]
if.app-id = 'com.cron.electron'
run = 'move-node-to-workspace B'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace B'

[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = 'move-node-to-workspace B'

# --- M: mail (Apple Mail + Superhuman) -------------------------------------
# No app-window-title filter: every window Mail/Superhuman spawn (compose,
# viewer, etc.) gets routed to M, since on-window-detected fires per window.
[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = 'move-node-to-workspace M'

[[on-window-detected]]
if.app-id = 'com.superhuman.electron'
run = 'move-node-to-workspace M'

# --- W: office / docs (Microsoft + Apple iWork + LibreOffice) --------------
[[on-window-detected]]
if.app-id = 'com.microsoft.Word'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.microsoft.Excel'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.microsoft.Powerpoint'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.apple.iWork.Keynote'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.apple.iWork.Pages'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.apple.iWork.Numbers'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'org.libreoffice.script'
run = 'move-node-to-workspace W'

# --- 3: AI desktop apps ----------------------------------------------------
[[on-window-detected]]
if.app-id = 'com.openai.chat'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = 'move-node-to-workspace 3'

# --- 9: hidden (no keybinding; reach via `aerospace workspace 9` if ever) --
# Workspace H is deliberately unused so alt-h stays free for `focus left`.
[[on-window-detected]]
if.app-id = 'com.granola.app'
run = 'move-node-to-workspace 9'

# Wispr Flow status pill: float, do NOT evict to 9. Workspace-change
# callback (top of file) keeps it on the focused workspace.
[[on-window-detected]]
if.app-id = 'com.electron.wispr-flow'
if.window-title-regex-substring = '^Status$'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.electron.wispr-flow'
run = 'move-node-to-workspace 9'

# --- Eviction rules: keep zoned workspaces strict --------------------------
# Anything not caught above that lands on a zoned workspace → workspace 2.
[[on-window-detected]]
if.workspace = 'C'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = '1'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'A'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'S'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'D'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'E'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'B'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'W'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'M'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = '3'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = '9'
run = 'move-node-to-workspace 2'

[gaps]
inner.horizontal = 6
inner.vertical   = 6
outer.left       = 6
outer.bottom     = 6
outer.top        = 6
outer.right      = 6

[mode.main.binding]
# --- Focus adjacent window ---
alt-h = 'focus --ignore-floating left'
alt-j = 'focus --ignore-floating down'
alt-k = 'focus --ignore-floating up'
alt-l = 'focus --ignore-floating right'

# --- Move focused window within workspace ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Move focused window to another monitor ---
alt-shift-left  = 'move-node-to-monitor --wrap-around prev'
alt-shift-right = 'move-node-to-monitor --wrap-around next'

# --- Resize ---
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# --- Jump to workspace ---
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-a = 'workspace A'   # Arc / browser
alt-c = 'workspace C'   # Claude
alt-d = 'workspace D'   # Agent Cockpit
alt-b = 'workspace B'   # Productivity / notes
alt-e = 'workspace E'   # Code editors + Codex
alt-m = 'workspace M'   # Mail (Apple Mail + Superhuman)
alt-s = 'workspace S'   # Slack / Teams
alt-w = 'workspace W'   # Word / office docs
# 9 (hidden) deliberately has no binding -- reach via `aerospace workspace 9` if needed
# H is deliberately never used as a workspace so alt-h stays free for `focus left`

# --- Send focused window to workspace ---
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-a = 'move-node-to-workspace A'
alt-shift-c = 'move-node-to-workspace C'
alt-shift-d = 'move-node-to-workspace D'
alt-shift-b = 'move-node-to-workspace B'
alt-shift-e = 'move-node-to-workspace E'
alt-shift-m = 'move-node-to-workspace M'
alt-shift-s = 'move-node-to-workspace S'
alt-shift-w = 'move-node-to-workspace W'

# --- Last workspace ---
alt-tab = 'workspace-back-and-forth'

# --- Layouts ---
alt-slash = 'layout tiles horizontal vertical'   # grid
alt-comma = 'layout accordion horizontal vertical'  # fan-out

# --- Fullscreen / float / reload ---
alt-f                = 'fullscreen'
alt-shift-space      = 'layout floating tiling'
alt-shift-semicolon  = 'reload-config'

# --- Launch new Ghostty into current workspace ---
alt-enter = 'exec-and-forget open -na Ghostty'
