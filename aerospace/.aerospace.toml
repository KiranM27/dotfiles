# --- H: hidden (no keybinding; reach via `aerospace workspace H` if ever) --
[[on-window-detected]]
if.app-id = 'com.granola.app'
run = 'move-node-to-workspace H'

[[on-window-detected]]
if.app-id = 'com.electron.wispr-flow'
run = 'move-node-to-workspace H'

# --- Eviction rules: keep zoned workspaces strict --------------------------
# Anything not caught above that lands on a zoned workspace → workspace 2.
[[on-window-detected]]
if.workspace = 'C'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = '1'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'A'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'S'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'E'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'B'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'W'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = '3'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.workspace = 'H'
run = 'move-node-to-workspace 2'

[gaps]
inner.horizontal = 6
inner.vertical   = 6
outer.left       = 6
outer.bottom     = 6
outer.top        = 6
outer.right      = 6

[mode.main.binding]
# --- Focus adjacent window ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# --- Move focused window within workspace ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Resize ---
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# --- Jump to workspace ---
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-a = 'workspace A'   # Arc / browser
alt-c = 'workspace C'   # Claude
alt-b = 'workspace B'   # Productivity / notes
alt-e = 'workspace E'   # Editor
alt-s = 'workspace S'   # Slack / Teams
alt-w = 'workspace W'   # Word / office docs
# H (hidden) deliberately has no binding -- reach via `aerospace workspace H` if needed

# --- Send focused window to workspace ---
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-a = 'move-node-to-workspace A'
alt-shift-c = 'move-node-to-workspace C'
alt-shift-b = 'move-node-to-workspace B'
alt-shift-e = 'move-node-to-workspace E'
alt-shift-s = 'move-node-to-workspace S'
alt-shift-w = 'move-node-to-workspace W'

# --- Last workspace ---
alt-tab = 'workspace-back-and-forth'

# --- Layouts ---
alt-slash = 'layout tiles horizontal vertical'   # grid
alt-comma = 'layout accordion horizontal vertical'  # fan-out

# --- Fullscreen / float / reload ---
alt-f                = 'fullscreen'
alt-shift-space      = 'layout floating tiling'
alt-shift-semicolon  = 'reload-config'

# --- Launch new Ghostty into current workspace ---
alt-enter = 'exec-and-forget open -na Ghostty'
